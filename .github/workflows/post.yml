name: Postagens Telegram

on:
  schedule:
    - cron: '0 11 * * *'
    - cron: '30 12 * * *'
    - cron: '0 14 * * *'
    - cron: '30 15 * * *'
    - cron: '0 17 * * *'
    - cron: '30 18 * * *'
    - cron: '0 20 * * *'
    - cron: '30 21 * * *'
    - cron: '0 23 * * *'
    - cron: '30 0 * * *'
  workflow_dispatch:

jobs:
  post:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run bot
        run: python bot.py 0
