name: Postagens Telegram

on:
  schedule:
    - cron: '0 11 * * *'
    - cron: '30 12 * * *'
    - cron: '0 14 * * *'
    - cron: '30 15 * * *'
    - cron: '0 17 * * *'
    - cron: '30 18 * * *'
    - cron: '0 20 * * *'
    - cron: '30 21 * * *'
    - cron: '0 23 * * *'
    - cron: '30 0 * * *'
  workflow_dispatch:

jobs:
  post:
    runs-on: ubuntu-latest

    steps:
      - name: Baixar repositório
        uses: actions/checkout@v3

      - name: Instalar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Instalar biblioteca requests
        run: pip install requests

      - name: Rodar bot
        run: python bot.py 0
